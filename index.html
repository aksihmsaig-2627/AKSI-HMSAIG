<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BankSAIG</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --dark:  #112250;
  --mid:   #3c507d;
  --light: #f5f0e9;
  --soft:  #d9cbc2;

  --text-main: #d9cbc2;
  --text-dim:  #f5f0e9;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;

    /* FIX RESPONSIVE */
    overflow-x:hidden;
    overflow-y:auto;

    color:var(--text-main);
    position:relative;
    padding:clamp(20px,5vw,60px);

    background: linear-gradient(135deg,var(--dark),var(--mid),#0c1a3a);
}

/* FOTO KIRI */
body::before{
    content:"";
    position:absolute;
    inset:0;

    background: url("Foto Geografi.jpg") left center/cover no-repeat;

    mask-image: linear-gradient(to right, black 45%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, black 45%, transparent 100%);

    filter: grayscale(100%) brightness(60%) contrast(110%);
    opacity:0.5;
    z-index:0;
}

/* OVERLAY */
body::after{
    content:"";
    position:absolute;
    inset:0;

    background: linear-gradient(
        to right,
        rgba(17,34,80,0.85),
        rgba(17,34,80,0.4),
        transparent
    );

    z-index:0;
}

/* BLOBS */
.blob{
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.4;
    animation:move 12s infinite alternate ease-in-out;
    z-index:1;
}

.blob1{background:var(--mid); top:10%; left:10%;}
.blob2{background:var(--soft); bottom:10%; right:10%; animation-delay:3s;}

@keyframes move{
    from{transform:translate(0,0);} 
    to{transform:translate(40px,-60px);} 
}

/* ICON */
.icon{
    position:absolute;
    font-size:clamp(18px,3vw,28px);
    opacity:0.08;
    color:var(--light);
    animation:float 10s infinite ease-in-out;
    z-index:1;
}

@keyframes float{
    0%,100%{transform:translateY(0);} 
    50%{transform:translateY(-30px);} 
}

/* MAIN */
.landing{
    text-align:center;
    z-index:2;
    animation:fadeUp 1s ease;
    max-width:600px;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);} 
    to{opacity:1; transform:translateY(0);} 
}

/* TITLE */
h1{
    font-size:clamp(2.2rem,6vw,4.5rem);
    font-weight:800;
    letter-spacing:2px;
    background:linear-gradient(90deg,var(--text-dim),var(--soft));
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom:20px;
}

/* TEXT */
p{
    font-size:clamp(0.95rem,2.5vw,1.2rem);
    opacity:0.9;
    margin-bottom:clamp(25px,5vw,50px);
    color:var(--text-main);
}

/* BUTTON */
.btn{
    position:relative;
    padding:clamp(14px,2.5vw,18px) clamp(40px,6vw,65px);
    border-radius:50px;
    border:none;
    background:linear-gradient(135deg,var(--soft),var(--light));
    color:var(--dark);
    font-weight:700;
    font-size:clamp(0.9rem,2vw,1rem);
    cursor:pointer;
    overflow:hidden;
    transition:.3s;
}

/* SHINE */
.btn::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.7),transparent);
    transform:translateX(-100%);
}

.btn:hover::before{
    transform:translateX(100%);
    transition:.6s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 20px 60px rgba(17,34,80,0.5);
}

/* RIPPLE */
.btn:active::after{
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    animation:ripple .6s linear;
}

@keyframes ripple{
    to{transform:scale(25); opacity:0;} 
}

/* MOBILE TWEAK */
@media(max-width:600px){
    body{
        align-items:flex-start;
    }

    body::before{
        mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
    }

    body::after{
        background: linear-gradient(
            to bottom,
            rgba(17,34,80,0.9),
            rgba(17,34,80,0.4),
            transparent
        );
    }
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<i class="icon fas fa-book" style="top:15%;left:20%"></i>
<i class="icon fas fa-graduation-cap" style="bottom:20%;left:15%"></i>
<i class="icon fas fa-flask" style="top:30%;right:20%"></i>
<i class="icon fas fa-globe" style="bottom:25%;right:25%"></i>

<div class="landing">
    <h1>BankSAIG</h1>
    <p>Kumpulan Materi dan Soal Prodi Kartografi dan Penginderaan Jauh</p>
    <button class="btn" onclick="enterHub()">Masuk</button>
</div>

<script>
function enterHub(){
    document.body.style.opacity="0";
    document.body.style.transform="scale(1.08)";
    document.body.style.transition="0.6s";
    setTimeout(()=>{
        window.location.href='landing.html';
    },600);
}
</script>

</body>
</html>
