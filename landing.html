<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sains Informasi Geografi</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --dark:  #112250;
  --mid:   #3c507d;
  --light: #f5f0e9;
  --soft:  #d9cbc2;
  --gold:  #f7d774;
  --text-main: #d9cbc2;
  --text-dim:  #f5f0e9;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    overflow-y:auto;
    color:var(--text-main);
    position:relative;
    padding:clamp(20px,5vw,60px);

    background:
        radial-gradient(circle at 20% 30%, rgba(60,80,125,0.5), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(17,34,80,0.6), transparent 45%),
        linear-gradient(135deg,var(--dark),var(--mid));
}

/* FOTO */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:45%;
    background: url("slide kedua.jpg") top center/cover no-repeat;
    mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
    filter: grayscale(100%) contrast(110%) brightness(60%);
    opacity:0.5;
    z-index:0;
}

/* OVERLAY */
body::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:45%;
    background: linear-gradient(to bottom, rgba(17,34,80,0.9), rgba(17,34,80,0.5), transparent);
    z-index:0;
}

/* BLOBS */
.blob{
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.4;
    animation:move 12s infinite alternate ease-in-out;
    z-index:1;
}
.blob1{background:var(--mid); top:10%; left:10%;}
.blob2{background:var(--soft); bottom:10%; right:10%; animation-delay:3s;}

@keyframes move{
    from{transform:translate(0,0);} 
    to{transform:translate(40px,-60px);} 
}

/* CONTAINER */
.container{
    width:100%;
    max-width:1000px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:clamp(20px,4vw,40px);
    align-items:center;
    z-index:2;
}

/* LEFT */
.left{text-align:left;}

.logo{
    width:clamp(70px,10vw,110px);
    height:clamp(70px,10vw,110px);
    object-fit:contain;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    background:white;
}

.left h1{
    font-size:clamp(1.8rem,4vw,3rem);
    font-weight:800;
    margin-bottom:15px;
    color:var(--text-dim);
}

.left p{
    font-size:clamp(0.9rem,2.5vw,1.1rem);
    opacity:0.85;
}

/* RIGHT */
.right{
    display:flex;
    flex-direction:column;
    gap:clamp(15px,3vw,25px);
}

/* CARD */
.card{
    display:flex;
    align-items:center;
    gap:clamp(12px,2vw,20px);
    padding:clamp(16px,3vw,26px);
    border-radius:25px;
    background:var(--light);
    box-shadow:0 15px 40px rgba(0,0,0,0.35);
    cursor:pointer;
    transition:.35s;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
}

/* OG CARD SPECIAL */
.og{
    background: linear-gradient(135deg, #fff8e1, #f7d774);
    box-shadow: 0 15px 50px rgba(247,215,116,0.5);
}

.og .icon-box{
    background: linear-gradient(135deg, #b8962e, #f7d774);
}

.og span{
    color:#5a4700;
}

/* SHINE */
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
}
.card:hover::before{
    left:100%;
    transition:0.6s;
}

/* ICON */
.icon-box{
    width:clamp(50px,8vw,65px);
    height:clamp(50px,8vw,65px);
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,var(--mid),var(--dark));
    color:var(--light);
    font-size:clamp(18px,2.5vw,24px);
}

/* TEXT */
.card span{
    font-size:clamp(16px,2.5vw,20px);
    font-weight:700;
    color:var(--dark);
    flex:1;
}

.arrow{
    color:var(--mid);
    opacity:0.7;
}

@media(max-width:600px){
    body{align-items:flex-start;}
    .left{text-align:center;}
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">

    <div class="left">
        <img src="logosaig.png" class="logo">
        <h1>Sains Informasi Geografi</h1>
        <p>Kumpulan Materi dan Soal Prodi Kartografi dan Penginderaan Jauh</p>
    </div>

    <div class="right">

        <div class="card" onclick="goTo('materi.html')">
            <div class="icon-box"><i class="fas fa-book-open"></i></div>
            <span>Materi Pembelajaran</span>
            <i class="fas fa-chevron-right arrow"></i>
        </div>

        <div class="card" onclick="goTo('soal.html')">
            <div class="icon-box"><i class="fas fa-pen-nib"></i></div>
            <span>Latihan Soal</span>
            <i class="fas fa-chevron-right arrow"></i>
        </div>

        <!-- OG CARD -->
        <div class="card og" onclick="goTo('banksaigasli.html')">
            <div class="icon-box"><i class="fas fa-crown"></i></div>
            <span>THE OG OF BANKSAIG</span>
            <i class="fas fa-chevron-right arrow"></i>
        </div>

    </div>

</div>

<script>
function goTo(page){
    document.body.style.transition = "0.5s";
    document.body.style.opacity = "0";
    document.body.style.transform = "scale(1.05)";
    setTimeout(()=>{
        window.location.href = page;
    },500);
}
</script>

</body>
</html>
