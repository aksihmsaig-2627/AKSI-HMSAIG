<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style> 
:root{
    --dark: #112250;
    --mid: #3c507d;
    --light: #f5f0e9;
    --soft: #d9cbc2;
    --text-main: #d9cbc2;
    --text-dim: #f5f0e9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,var(--dark),var(--mid));
    color:var(--text-main);

    /* FLEXIBLE */
    min-height:100vh;
    padding:clamp(20px,5vw,50px);
}

/* MAIN */
.main{
    text-align:center;
}

/* TITLE */
h1{
    font-size:clamp(2rem,5vw,3.2rem);
    margin-bottom:clamp(20px,5vw,40px);

    background:linear-gradient(90deg,var(--light),var(--soft));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
}

/* GRID AUTO RESPONSIVE */
.grid{
    display:grid;

    /* INI KUNCI FLEXIBLE */
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));

    gap:clamp(15px,3vw,25px);
    max-width:800px;
    margin:auto;
}

/* CARD */
.card{
    aspect-ratio:1/1; /* BIKIN KOTAK OTOMATIS */
    border-radius:25px;

    background: rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    cursor:pointer;
    transition:.3s;
    padding:10px;
}

/* HOVER */
.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    background: rgba(255,255,255,0.08);
}

/* ICON */
.card i{
    font-size:clamp(22px,4vw,35px);
    margin-bottom:10px;
    color:var(--soft);
}

/* TEXT */
.card h3{
    margin:0;
    font-weight:700;
    font-size:clamp(0.85rem,2.5vw,1rem);
    color:var(--text-dim);
    text-align:center;
}

/* BUTTON */
button{
    margin-top:20px;
    padding:clamp(8px,2vw,12px) clamp(16px,4vw,25px);
    border:none;
    border-radius:12px;
    background:var(--soft);
    color:var(--dark);
    cursor:pointer;
    transition:.3s;
    font-size:clamp(0.8rem,2vw,1rem);
}

button:hover{
    background:var(--light);
}

.btn-back{
    display:block;
    margin:clamp(10px,3vw,20px) auto 0;
    padding:clamp(5px,1.5vw,8px) clamp(10px,3vw,16px);
    border-radius:8px;
    background:#112250;
    color:white;
    text-decoration:none;
    font-size:clamp(0.7rem,2vw,0.85rem);
    width:fit-content;
}
/* SECTION */
.section{
    display:none;
    animation:fade .4s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>
</head>

<script>
function openSemester(num){
    document.getElementById("semesterList").style.display = "none";

    document.getElementById("btnHome").style.display = "none";

    document.querySelectorAll(".section").forEach(sec => {
        sec.style.display = "none";
    });

    document.getElementById("semester"+num).style.display = "block";
}
function back(){
    document.getElementById("semesterList").style.display = "";

    document.getElementById("btnHome").style.display = "block";

    document.querySelectorAll(".section").forEach(sec => {
        sec.style.display = "none";
    });
}

function notReady(){
    alert("Maaf Laman Ini Belum Tersedia");
}

function goLink(link){
    if(link.includes("LINK_")){
        alert("Link Google Drive belum diisi!");
    } else {
        window.open(link, "_blank");
    }
}
</script>
